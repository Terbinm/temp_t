<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團隊自我介紹共享平台</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-glow: rgba(6, 182, 212, 0.15);
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-purple: #8b5cf6;
            --accent-rose: #f43f5e;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 760px;
            z-index: 10;
        }

        /* Glassmorphism Card styling */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5),
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
            transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: translateY(20px);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .user-badge {
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.3);
            color: var(--accent-cyan);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            border-color: var(--accent-cyan);
            background: rgba(31, 41, 55, 0.8);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
        }

        input:disabled,
        textarea:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(17, 24, 39, 0.3);
            border-color: rgba(255, 255, 255, 0.05);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        /* Premium Buttons */
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
            background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
            width: 100%;
            position: relative;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-update {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
            margin-top: 10px;
        }

        .btn-update:hover {
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
        }

        /* Member Tabs */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .member-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            padding: 14px 10px;
            font-size: 14px;
            border-radius: 12px;
            box-shadow: none;
            text-align: center;
        }

        .member-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: none;
        }

        .member-btn.active {
            background: linear-gradient(135deg, var(--accent-emerald), #059669);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .member-btn.active:hover {
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .permission-warning {
            background: rgba(244, 63, 94, 0.12);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--accent-rose);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        hr {
            border: 0;
            height: 1px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
            margin: 25px 0;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 4px solid var(--accent-cyan);
            padding: 16px 20px;
            border-radius: 12px;
            color: var(--text-primary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            min-width: 280px;
            max-width: 400px;
            animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.3s ease;
        }

        .toast.error {
            border-left-color: var(--accent-rose);
        }

        .toast.success {
            border-left-color: var(--accent-emerald);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 1. 登入區塊 -->
        <div id="login-section" class="card">
            <h2>系統核心登入</h2>
            <div class="subtitle"></div>

            <div class="input-group">
                <label for="username">使用者帳號</label>
                <input type="text" id="username" placeholder="請輸入您的帳號 (如 member_a)">
            </div>

            <div class="input-group">
                <label for="password">安全密碼</label>
                <input type="password" id="password" placeholder="請輸入密碼">
            </div>

            <button onclick="handleLogin()">
                <span>驗證並登入系統</span>
            </button>
            <div style="min-height: 20px; margin-top: 12px; text-align: center;">
                <p id="login-msg" style="color: var(--accent-rose); font-size: 13px; font-weight: 500;"></p>
            </div>
        </div>

        <!-- 2. 主內容區塊 (登入後顯示) -->
        <div id="main-section" class="card hidden">
            <div class="header-row">
                <h2>團隊成員自我介紹</h2>
                <div class="user-badge">登入者: <strong id="logged-user-name">--</strong></div>
            </div>
            <div class="subtitle">連線至個別微服務容器並寫入 PostgreSQL 共用資料庫</div>

            <!-- 切換成員後端按鈕 -->
            <div class="btn-group">
                <button class="member-btn" onclick="switchMember(8001, this, 'member_a')">同學 A (Port 8001)</button>
                <button class="member-btn" onclick="switchMember(8002, this, 'member_b')">同學 B (Port 8002)</button>
                <button class="member-btn" onclick="switchMember(8003, this, 'member_c')">同學 C (Port 8003)</button>
            </div>

            <hr>

            <!-- 權限警告 -->
            <div id="permission-warning" class="permission-warning hidden">
                🔒 唯讀模式
            </div>

            <!-- 顯示/修改自我介紹 -->
            <div id="intro-display">
                <div class="input-group">
                    <label for="member-name">姓名</label>
                    <input type="text" id="member-name" placeholder="請輸入姓名">
                </div>

                <div class="input-group">
                    <label for="member-bio">個人簡介</label>
                    <textarea id="member-bio" placeholder="告訴大家一些關於你的事..."></textarea>
                </div>

                <div class="input-group">
                    <label for="member-skills">專業技能 (用逗號隔開)</label>
                    <input type="text" id="member-skills" placeholder="例如: Python, Flask, Docker">
                </div>

                <button onclick="updateMemberData()" class="btn-update">儲存並更新資料</button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // 核心系統後端網址 (Port 8000)
        const SYSTEM_URL = 'http://localhost:8000';
        let currentMemberPort = null;
        let currentUser = null;

        // 顯示 Custom Toast 訊息
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon = '';
            if (type === 'success') {
                icon = `<svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 0C4.48 0 0 4.48 0 10C0 15.52 4.48 20 10 20C15.52 20 20 15.52 20 10C20 4.48 15.52 0 10 0ZM8 15L3 10L4.41 8.59L8 12.17L15.59 4.58L17 6L8 15Z" fill="#10b981"/></svg>`;
            } else {
                icon = `<svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 0C4.48 0 0 4.48 0 10C0 15.52 4.48 20 10 20C15.52 20 20 15.52 20 10C20 4.48 15.52 0 10 0ZM11 15H9V13H11V15ZM11 11H9V5H11V11Z" fill="#f43f5e"/></svg>`;
            }

            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 處理登入 (呼叫第 4 個核心後端)
        async function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const loginMsg = document.getElementById('login-msg');

            loginMsg.innerText = '';

            try {
                const res = await fetch(`${SYSTEM_URL}/api/system/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if (res.ok) {
                    currentUser = data.username || u;
                    document.getElementById('logged-user-name').innerText = currentUser;
                    showToast(`歡迎 ${currentUser}！身分驗證成功`, 'success');

                    const loginSec = document.getElementById('login-section');
                    const mainSec = document.getElementById('main-section');

                    loginSec.style.opacity = '0';
                    loginSec.style.transform = 'translateY(-20px)';
                    loginSec.style.transition = 'all 0.4s ease';

                    setTimeout(() => {
                        loginSec.classList.add('hidden');
                        mainSec.classList.remove('hidden');

                        // 依據帳號預設選擇對應按鈕或預設同學A
                        let targetBtnIndex = 0;
                        if (currentUser === 'member_b') targetBtnIndex = 1;
                        if (currentUser === 'member_c') targetBtnIndex = 2;

                        const memberBtns = document.querySelectorAll('.member-btn');
                        if (memberBtns[targetBtnIndex]) memberBtns[targetBtnIndex].click();
                    }, 400);
                } else {
                    loginMsg.innerText = data.message || '驗證失敗，請檢查帳號與密碼';
                    showToast(data.message || '驗證失敗', 'error');
                }
            } catch (err) {
                loginMsg.innerText = '無法連線到系統核心後端，請確認容器是否啟動';
                showToast('無法連線到系統核心後端', 'error');
            }
        }

        // 切換成員後端並抓取資料 (呼叫 Port 8001~8003)
        async function switchMember(port, element, targetMemberId) {
            currentMemberPort = port;

            // 切換按鈕高亮狀態
            document.querySelectorAll('.member-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // 判斷當前使用者是否有修改權限 (admin 擁有全權，其餘使用者只能修改自己的頁面)
            const isEditable = (currentUser === 'admin') || (currentUser === targetMemberId);

            const nameInput = document.getElementById('member-name');
            const bioInput = document.getElementById('member-bio');
            const skillsInput = document.getElementById('member-skills');
            const updateBtn = document.querySelector('.btn-update');
            const permWarning = document.getElementById('permission-warning');

            if (isEditable) {
                nameInput.disabled = false;
                bioInput.disabled = false;
                skillsInput.disabled = false;
                updateBtn.style.display = 'block';
                permWarning.classList.add('hidden');
            } else {
                nameInput.disabled = true;
                bioInput.disabled = true;
                skillsInput.disabled = true;
                updateBtn.style.display = 'none';
                permWarning.classList.remove('hidden');
            }

            try {
                const res = await fetch(`http://localhost:${port}/api/intro`);
                const data = await res.json();
                if (res.ok) {
                    nameInput.value = data.name || '';
                    bioInput.value = data.bio || '';
                    skillsInput.value = data.skills || '';
                    showToast(`成功讀取 ${targetMemberId} 資料！`, 'success');
                } else {
                    showToast('讀取資料失敗', 'error');
                }
            } catch (err) {
                showToast(`無法連線至該成員的後端 (Port ${port})`, 'error');
            }
        }

        // 修改並儲存該成員的自我介紹 (呼叫對應的個人 Port)
        async function updateMemberData() {
            if (!currentMemberPort) return;

            const payload = {
                name: document.getElementById('member-name').value,
                bio: document.getElementById('member-bio').value,
                skills: document.getElementById('member-skills').value
            };

            try {
                const res = await fetch(`http://localhost:${currentMemberPort}/api/intro`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('儲存成功！已將資料同步寫入 PostgreSQL！', 'success');
                } else {
                    showToast('儲存失敗', 'error');
                }
            } catch (err) {
                showToast('更新資料時發生錯誤，請確認網路連線', 'error');
            }
        }

        // 綁定 Enter 鍵直接登入
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>

</html>
